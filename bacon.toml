#:schema https://dystroy.org/bacon/.bacon.schema.json

# toolu-runner — bacon job definitions
# Docs: https://dystroy.org/bacon/config/

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--workspace", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--color", "always", "--", "-D", "warnings"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--workspace", "--color", "always"]
need_stdout = true

[jobs.fmt]
command = ["cargo", "fmt", "--all", "--check"]
need_stdout = false

[jobs.run-runner]
command = ["cargo", "run", "-p", "toolu-runner", "--color", "always", "--", "run"]
need_stdout = true
allow_warnings = true
background = false
on_change_strategy = "kill_then_restart"
default_watch = false
watch = ["crates/"]
