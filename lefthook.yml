# toolu-runner — Git hooks.
#
# Install: lefthook install
# Run manually: lefthook run pre-commit

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "crates/**/*.rs"
      run: cargo fmt --all -- --check
    rust-clippy:
      glob: "crates/**/*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings

pre-push:
  parallel: false
  commands:
    full-check:
      run: ./tools/check.sh all
