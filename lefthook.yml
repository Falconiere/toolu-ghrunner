# toolu-runner — Git hooks.
#
# Install: lefthook install
# Run manually: lefthook run pre-commit

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "{shared,protocol,toolu-runner}/**/*.rs"
      run: cargo fmt --all -- --check
    rust-clippy:
      glob: "{shared,protocol,toolu-runner}/**/*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings
    no-yamless-coupling:
      run: ! grep -r 'yamless' shared/ protocol/ toolu-runner/ Cargo.toml 2>/dev/null

pre-push:
  parallel: false
  commands:
    full-check:
      run: ./tools/check.sh all
