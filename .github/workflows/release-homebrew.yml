name: release-homebrew

# Publishes Formula/toolu-runner.rb to the Falconiere/homebrew-tap repo after
# a stable release is published. release.yml calls this workflow as a
# `needs: publish` job. Downloads SHA256SUMS straight from the release (same
# read-back pattern as release-finalize.yml), renders the formula with
# scripts/generate-homebrew-formula.sh, and pushes it to the tap with a PAT
# (the default GITHUB_TOKEN has no access outside this repo). Never touches
# this repo.
#
# Reusable, NOT `on: release: [published]` — a release created by a workflow
# step using the default GITHUB_TOKEN emits no `release` event, so an
# event-triggered version of this workflow could never fire. Under
# `workflow_call` the `github` context is the CALLER's, so `github.ref_name`
# is the pushed tag and there is no `github.event.release` payload at all.
# Concurrency is owned by the caller (release.yml), keyed on the same tag.
#
# The prerelease skip (tag contains '-') lives here rather than on the caller
# so the guard travels with the thing it guards: the tap must only ever point
# at a stable release, whoever calls this.
on:
  workflow_call:
    secrets:
      HOMEBREW_TAP_TOKEN:
        description: Fine-grained PAT, Contents read+write on Falconiere/homebrew-tap.
        required: true

permissions:
  contents: read

jobs:
  publish-formula:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS from the release
        run: gh release download "$TAG" --repo "${{ github.repository }}" -p SHA256SUMS -D dist

      - name: Generate Formula/toolu-runner.rb
        run: bash scripts/generate-homebrew-formula.sh "$TAG" dist/SHA256SUMS > toolu-runner.rb

      - name: Push formula to homebrew-tap
        env:
          # Fine-grained PAT with Contents: read+write on Falconiere/homebrew-tap.
          # Must be provisioned as a repo secret before this job can succeed;
          # the default GITHUB_TOKEN is scoped to this repo only.
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set — see docs/architecture.md § Release pipeline"
            exit 1
          fi
          # Auth via an extraheader (same technique actions/checkout uses)
          # instead of embedding the PAT in the remote URL, so it never
          # appears in `git remote -v` output or clone/push error messages.
          header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TAP_TOKEN" | base64 -w0)"
          git -c http.https://github.com/.extraheader="$header" \
            clone https://github.com/Falconiere/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp toolu-runner.rb tap/Formula/toolu-runner.rb
          cd tap
          git config http.https://github.com/.extraheader "$header"
          git config user.name "toolu-runner release bot"
          git config user.email "actions@users.noreply.github.com"
          # Stage BEFORE comparing. On a first release the formula does not yet
          # exist in the tap, so it is untracked — and `git diff` ignores
          # untracked files, reporting "no changes" and skipping the push while
          # the job still exits 0. `--cached` compares the index against HEAD,
          # which sees a new file as an addition and an unchanged formula as a
          # no-op.
          git add Formula/toolu-runner.rb
          if git diff --cached --quiet -- Formula/toolu-runner.rb; then
            echo "::notice::formula unchanged, nothing to push"
            exit 0
          fi
          git commit -m "toolu-runner ${TAG}"
          git push
