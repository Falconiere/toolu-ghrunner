name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Protocol crate is sync + I/O-free (AC #22)
        run: |
          if cargo tree -p protocol | grep -qE 'reqwest|tokio|opendal|bollard|axum'; then
            echo "ERROR: protocol crate must not depend on I/O crates"
            exit 1
          fi
      - name: Run release-script tests
        # Explicit list, not a scripts/test/*.sh glob — the plist/systemd tests
        # there are macOS-only and would fail on ubuntu.
        run: |
          for t in assert_version changelog_extract package_release release_workflow release_finalize_workflow generate_homebrew_formula release_homebrew_workflow release_pr_workflow release_pr_script; do
            bash "scripts/test/${t}_test.sh"
          done