name: toolu-smoke

# Live smoke for toolu-runner (self-hosted). Minimal single-step job to
# isolate job-completion/finalization from step-command behaviour.
on:
  push:
    branches: [smoke/gh-compat-live]
  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted]
    steps:
      - name: hello
        run: |
          echo "hello from toolu-runner"
          echo "out=ok" >> "$GITHUB_OUTPUT"
