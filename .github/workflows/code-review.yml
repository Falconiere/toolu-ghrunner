name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write # upload the gitleaks/opengrep SARIF to the Code Scanning tab

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the merge-base resolves without deepening
      - uses: falconiere/toolu-ghactions/code-review@v6
        with:
          PROVIDER: openrouter
          API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Read convention files (CLAUDE.md etc.) from the PR merge ref
          # instead of the base ref, so a PR that legitimately changes a
          # convention is reviewed against its own updated text. Safety:
          # fork PRs do trigger `pull_request`, but the action step fails
          # for them (secrets are not exposed to fork runs), so no fork
          # diff is ever reviewed under merge-ref rules. Requires
          # toolu-ghactions >= 6.3.0.
          RULES_REF: merge
          # Surrender cap (toolu-ghactions >= 6.4.0): on review round 5+ a
          # blocker-free "changes" verdict auto-approves — findings stay
          # listed as advisory — so a fresh-findings-every-push review can
          # never block a PR forever. One blocker finding disables the cap.
          MAX_ROUNDS: '5'
