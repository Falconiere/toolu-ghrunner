name: release-finalize

# Post-publish safety net for the tag-driven release in release.yml, which
# calls this workflow as a `needs: publish` job. Once the release exists,
# download each target's tarball straight back from it (not the build
# artifact) and verify it both matches SHA256SUMS and extracts to the layout
# install.sh expects. This catches upload corruption or a stale SHA256SUMS
# that `publish` can't see — it only checksums what it's about to upload,
# never what actually lands on the release after GitHub's asset upload.
# Read-only: never edits the release or the repo, and never gates the release
# itself (it already exists by the time this runs).
#
# Reusable, NOT `on: release: [published]` — a release created by a workflow
# step using the default GITHUB_TOKEN emits no `release` event, so an
# event-triggered version of this workflow could never fire. Under
# `workflow_call` the `github` context is the CALLER's, so `github.ref_name`
# is the pushed tag and there is no `github.event.release` payload at all.
# Concurrency is owned by the caller (release.yml), keyed on the same tag.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke-test:
    name: smoke-test (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    env:
      # A called workflow is automatically granted github.token; `contents:
      # read` is enough for `gh release download` on a public repo.
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.ref_name }}
      TARBALL: toolu-runner-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
    steps:
      - name: Download tarball + checksums
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            -p "$TARBALL" \
            -p SHA256SUMS \
            -D dist

      - name: Verify checksum against SHA256SUMS
        working-directory: dist
        run: sha256sum --ignore-missing -c SHA256SUMS

      - name: Verify size sanity
        working-directory: dist
        run: |
          # runs-on is pinned to ubuntu-24.04 (GNU coreutils) — no macOS fallback needed.
          size="$(stat -c%s "$TARBALL")"
          if (( size < 1048576 )); then
            echo "::error::$TARBALL is suspiciously small: ${size} bytes"
            exit 1
          fi
          echo "::notice::$TARBALL OK (${size} bytes)"

      - name: Verify tarball layout matches install.sh's extraction probe
        working-directory: dist
        run: |
          listing="$(tar -tzf "$TARBALL")"
          for member in toolu-runner scripts/io.toolu-runner.plist scripts/toolu-runner.service; do
            if ! grep -qxF "$member" <<<"$listing"; then
              echo "::error::$TARBALL missing expected member: $member"
              exit 1
            fi
          done
          echo "::notice::$TARBALL layout OK"
