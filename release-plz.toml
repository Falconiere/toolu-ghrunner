# release-plz configuration — the front half of the release pipeline.
#
# On every push to main, .github/workflows/release-plz.yml runs release-plz:
#   * release-pr opens/updates a PR that bumps [workspace.package] version and
#     rewrites CHANGELOG.md from the conventional commits since the last tag.
#   * release (once that PR has merged) pushes the matching `vX.Y.Z` git tag,
#     which fires the existing tag-triggered .github/workflows/release.yml
#     (build 4 targets -> GitHub Release -> Homebrew).
#
# This project is never published to crates.io and the GitHub Release is cut by
# release.yml, so release-plz only bumps the version, writes the changelog, and
# pushes the single tag. Everything else is disabled below.

[workspace]
# Never `cargo publish` — toolu-runner is a distributed binary, not a crate.
publish = false
# Derive the current version from git tags, not the cargo registry (we don't
# publish, so the registry has nothing to compare against).
git_only = true
# release.yml creates the GitHub Release (with CHANGELOG-derived notes); release-plz
# must not create a second, empty one.
git_release_enable = false
# Disabled workspace-wide so the 3-crate workspace does not emit three tags; the
# single `toolu-runner` package below re-enables exactly one.
git_tag_enable = false
# Keep CHANGELOG.md in lockstep with the version bump.
changelog_update = true

# Single-tag pattern (https://release-plz.dev/docs/extra/single-tag): only the
# top-level binary crate cuts a tag, and it drops the package-name prefix so the
# tag is `vX.Y.Z` — exactly what release.yml's `on: push: tags: ['v*']` and
# scripts/assert-version.sh expect.
[[package]]
name = "toolu-runner"
git_tag_enable = true
git_tag_name = "v{{ version }}"
version_group = "toolu-runner"
# All crates share one changelog at the repo root (relative to the root
# Cargo.toml) — the file scripts/changelog-extract.sh reads. `changelog_path`
# cannot be set in [workspace]; it lives on the crate that owns the file.
changelog_path = "./CHANGELOG.md"
# Fold commits that only touch shared/ or protocol/ into this one changelog,
# so nothing is lost when those crates don't maintain their own.
changelog_include = ["shared", "protocol"]

# `shared` and `protocol` share `version.workspace`, so a common version_group
# makes the highest conventional-commit bump apply to all three uniformly. They
# don't tag (workspace default) and don't write their own changelog — their
# commits are folded into the root CHANGELOG.md via `changelog_include` above.
[[package]]
name = "shared"
version_group = "toolu-runner"
changelog_update = false

[[package]]
name = "protocol"
version_group = "toolu-runner"
changelog_update = false

[changelog]
# Must match the existing CHANGELOG.md preamble byte-for-byte, or release-plz
# fails to parse the file it is meant to extend.
header = """
# Changelog

All notable changes to toolu-runner are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

"""
# Keep a Changelog section: heading is `## [X.Y.Z] - YYYY-MM-DD` with NO package
# prefix (scripts/changelog-extract.sh matches `^## \[<version>\]`). Groups come
# from commit_parsers below.
body = """
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
{%- if commit.scope -%}
- *({{ commit.scope }})* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}
{% else -%}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}
{% endif -%}
{% endfor -%}
{% endfor %}
"""
trim = true
# feat -> Added, fix -> Fixed, docs -> Documentation, refactor/perf -> Changed;
# chore/ci/test/build are release plumbing and never reach the changelog.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
]
